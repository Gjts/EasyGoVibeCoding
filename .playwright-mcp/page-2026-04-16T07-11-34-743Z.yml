                    - listitem [ref=e199]: • 用任务拆解和子代理分工，先明确谁负责探索、谁负责实现、谁负责评审
                    - listitem [ref=e200]: • 用共享任务状态记录 owner、依赖和完成情况，降低上下文漂移
