                - heading "ADD 工作流" [level=3] [ref=e137]
                - generic [ref=e138]:
                  - generic [ref=e139]:
                    - generic [ref=e140]: "1"
                    - generic [ref=e141]:
                      - strong [ref=e142]: 目标拆解
                      - text: ：先把目标拆成可验证、可交付的任务单元，而不是直接把模糊需求交给一个大 Agent。
                  - generic [ref=e143]:
                    - generic [ref=e144]: "2"
                    - generic [ref=e145]:
                      - strong [ref=e146]: 角色分工
                      - text: ：为不同角色定义输入、输出和责任边界，例如 Planner、Coding Agent、QA Agent、Reviewer。
                  - generic [ref=e147]:
                    - generic [ref=e148]: "3"
                    - generic [ref=e149]:
                      - strong [ref=e150]: 上下文契约
                      - text: ：明确共享什么上下文、何时同步、哪些事实必须引用代码或文档验证。
                  - generic [ref=e151]:
                    - generic [ref=e152]: "4"
                    - generic [ref=e153]:
                      - strong [ref=e154]: 验收闭环
                      - text: ：用测试、构建、人工检查和审阅意见形成交付闭环，而不是只看 Agent 是否“说完成了”。
              - generic [ref=e155]:
                - heading "多 Agent 协作模式" [level=3] [ref=e156]:
                  - img [ref=e157]
                  - text: 多 Agent 协作模式
                - generic [ref=e162]:
                  - generic [ref=e163]:
                    - generic [ref=e164]: Planner / Executor / Reviewer
                    - paragraph [ref=e165]: 适合交付链路清晰的任务，由 Planner 拆解，Executor 实现，Reviewer 负责质量门禁。
                  - generic [ref=e166]:
                    - generic [ref=e167]: Specialist Swarm
                    - paragraph [ref=e168]: 适合跨领域问题，如安全、性能、UI、架构各自给出独立判断，再由主控汇总。
                  - generic [ref=e169]:
                    - generic [ref=e170]: Micro-Agent Network
                    - paragraph [ref=e171]: 将复杂任务拆到最小职责单元，提升可替换性，但需要更严格的上下文管理。
                  - generic [ref=e172]:
                    - generic [ref=e173]: Human-in-the-loop
                    - paragraph [ref=e174]: 在人类审批、发布、外部系统写入等关键节点强制人工确认，控制高风险动作。
              - generic [ref=e175]:
                - heading "工程治理重点" [level=3] [ref=e176]:
                  - img [ref=e177]
                  - text: 工程治理重点
                - list [ref=e180]:
                  - listitem [ref=e181]:
                    - text: •
                    - strong [ref=e182]: 可观测性
                    - text: ：记录每个 Agent 的输入、决策摘要、产出和失败原因
                  - listitem [ref=e183]:
                    - text: •
                    - strong [ref=e184]: 边界控制
                    - text: ：规定哪些 Agent 只能读，哪些 Agent 可以写，哪些动作必须审批
                  - listitem [ref=e185]:
                    - text: •
                    - strong [ref=e186]: 去重机制
                    - text: ：通过任务列表、owner 和依赖关系避免多个 Agent 做同一件事
                  - listitem [ref=e187]:
                    - text: •
                    - strong [ref=e188]: 成本控制
                    - text: ：先用轻量角色做筛选，再调用高成本模型做关键决策
            - generic [ref=e189]:
