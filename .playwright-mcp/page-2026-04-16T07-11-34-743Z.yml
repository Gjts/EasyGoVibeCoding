                - list [ref=e221]:
                  - listitem [ref=e222]: • Planner 读取 PRD 和代码结构，输出可执行任务清单
                  - listitem [ref=e223]: • Coding Agent 按任务实现改动，QA Agent 运行验证，Reviewer 做最终把关
                  - listitem [ref=e224]: • 在发布、数据库变更、外部系统写入等节点保留人工审批
