                - generic [ref=e161]:
                  - generic [ref=e162]:
                    - heading "知识分块" [level=4] [ref=e163]
                    - list [ref=e164]:
                      - listitem [ref=e165]: • 以语义完整性优先，不要只按固定字数粗暴切片
                      - listitem [ref=e166]: • 为每个 chunk 增加来源、时间、业务域、权限等元数据
                      - listitem [ref=e167]: • 对架构文档、接口文档、代码说明书使用不同的分块策略
                  - generic [ref=e168]:
                    - heading "检索与重排序" [level=4] [ref=e169]
                    - list [ref=e170]:
                      - listitem [ref=e171]: • 通用问答优先考虑混合检索，兼顾语义召回与关键词精确匹配
                      - listitem [ref=e172]: • 对长代码分析场景，重排序通常比单纯增加 top-k 更有效
                      - listitem [ref=e173]: • 上下文组装时要保留来源和层级，避免片段脱离原语境
                  - paragraph [ref=e175]:
                    - strong [ref=e176]: 实践原则
                    - text: ：先做“能解释为什么答成这样”的 RAG，再追求“看起来更聪明”的回答质量。
              - generic [ref=e177]:
