                    - text: ：问题对应的正确文档是否被检索出来
                  - listitem [ref=e185]:
                    - text: •
                    - strong [ref=e186]: 答案评估
                    - text: ：回答是否准确、完整、是否引用了正确来源
                  - listitem [ref=e187]:
                    - text: •
                    - strong [ref=e188]: 失败复盘
                    - text: ：区分是检索失败、上下文污染还是生成阶段幻觉
                  - listitem [ref=e189]:
                    - text: •
                    - strong [ref=e190]: 权限治理
                    - text: ：按知识域和用户身份隔离文档，避免越权召回
