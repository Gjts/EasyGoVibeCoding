#:schema node_modules/wrangler/config-schema.json
name = "easy-go-vibe-coding"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages 静态部署配置
pages_build_output_dir = ".cache/i18n-deploy"

[vars]
I18N_SITE_ORIGIN = "https://easy-go-vibe-coding.pages.dev"

# 真实站点统计需要绑定 Cloudflare KV
# 请先创建 KV namespace，然后把下面的占位 ID 替换为你的真实值
[[kv_namespaces]]
binding = "SITE_STATS_KV"
id = "04e02c1e72b44bee95ad85eb96c6da07"
preview_id = "04e02c1e72b44bee95ad85eb96c6da07"

# 真实邮箱反馈双重授权存储。当前复用同一个 KV namespace，
# 通过 email-feedback:* key 前缀隔离；后续可替换为独立 namespace。
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "04e02c1e72b44bee95ad85eb96c6da07"
preview_id = "04e02c1e72b44bee95ad85eb96c6da07"

# 首页“请求最新”通过 Service Binding 内部调用 model-updater Worker，
# 避免依赖公开 workers.dev URL。
[[services]]
binding = "MODEL_UPDATER"
service = "model-updater"

[observability]
enabled = true
